---
# roles/cilium-install/tasks/main.yml

- name: Install wireguard-tools on all nodes
  ansible.builtin.apt:
    name: wireguard-tools
    state: present
    update_cache: true
  become: true

- name: Check if cilium is already installed
  ansible.builtin.command: helm list -n kube-system
  register: helm_list
  changed_when: false
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Add Cilium Helm repository
  ansible.builtin.shell: |
    helm repo add cilium https://helm.cilium.io
    helm repo update
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: "'cilium' not in helm_list.stdout"
  changed_when: true

- name: Install Cilium with WireGuard encryption
  ansible.builtin.shell: |
    cilium install \
      --set k8sServiceHost=master1.local \
      --set k8sServicePort=6443 \
      --set kubeProxyReplacement=strict \
      --set encryption.enabled=true \
      --set encryption.type=wireguard \
      --set hubble.relay.enabled=true \
      --set hubble.ui.enabled=true
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: "'cilium' not in helm_list.stdout"
  register: cilium_install
  changed_when: "'installed' in cilium_install.stdout"

- name: Wait for Cilium pods to be ready
  ansible.builtin.command: |
    kubectl rollout status daemonset/cilium -n kube-system --timeout=5m
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  when: cilium_install.changed

- name: Verify Cilium encryption status
  ansible.builtin.command: cilium encryption status
  register: encryption_status
  changed_when: false
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Display encryption status
  ansible.builtin.debug:
    msg: "{{ encryption_status.stdout }}"
  run_once: true

- name: Assert encryption is enabled
  ansible.builtin.assert:
    that:
      - "'enabled' in encryption_status.stdout or 'Wireguard' in encryption_status.stdout"
    fail_msg: "Cilium encryption not enabled!"
    success_msg: "Cilium encryption enabled ✓"
  run_once: true
