---
# ============================================================================
# Prerequisites
# ============================================================================

- name: Install wireguard-tools
  ansible.builtin.apt:
    name: wireguard-tools
    state: present
    update_cache: true
  become: true

# ============================================================================
# Cilium Installation
# ============================================================================

- name: Add Cilium repo
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Install Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: 1.15.6
    release_namespace: kube-system
    kubeconfig: /etc/kubernetes/admin.conf
    values:
      k8sServiceHost: master1.local
      k8sServicePort: 6443
      kubeProxyReplacement: strict
      encryption:
        enabled: true
        type: wireguard
      hubble:
        relay:
          enabled: true
        ui:
          enabled: true
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

# ============================================================================
# Wait for Readiness
# ============================================================================

- name: Wait for Cilium
  ansible.builtin.command: kubectl rollout status daemonset/cilium -n kube-system --timeout=5m
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

# ============================================================================
# Verify Encryption and Connectivity
# ============================================================================

- name: Verify encryption
  ansible.builtin.command: kubectl -n kube-system exec ds/cilium -- cilium encrypt status
  register: encryption_status
  changed_when: false
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Debug encryption status
  ansible.builtin.debug:
    var: encryption_status.stdout

- name: Check UDP connectivity between nodes (WireGuard port)
  ansible.builtin.shell: nc -zvu {{ item }} 51871
  with_items: "{{ groups['workers'] }}"
  register: wg_connectivity
  changed_when: false
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true

- name: Debug WireGuard connectivity
  ansible.builtin.debug:
    var: wg_connectivity.results
