---
- name: Deploy Raspberry Pi boot configuration
  ansible.builtin.template:
    src: config.txt.j2
    dest: /boot/firmware/config.txt
    owner: root
    group: root
    mode: '0755'
  register: config_file_status

- name: Reboot the Raspberry Pi if config changed
  ansible.builtin.reboot:
    msg: "Rebooting to apply new config.txt settings"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
  when: config_file_status.changed
