---
# ============================================================================
# Apply Node Labels
# ============================================================================

- name: Label high-memory nodes
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    command: label
    kind: nodes
    name: "{{ item }}"
    labels:
      node-tier: high-memory
    state: present
  loop: "{{ groups['high_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Label mid-memory nodes
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    command: label
    kind: nodes
    name: "{{ item }}"
    labels:
      node-tier: mid-memory
    state: present
  loop: "{{ groups['mid_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Label low-memory node
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    command: label
    kind: nodes
    name: "{{ item }}"
    labels:
      node-tier: low-memory
    state: present
  loop: "{{ groups['low_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

# ============================================================================
# Apply Node Taints
# ============================================================================

- name: Taint low-memory node
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    command: taint
    kind: nodes
    name: "{{ item }}"
    taints:
      - key: memory
        value: limited
        effect: NoSchedule
    state: present
  loop: "{{ groups['low_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Taint master node
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    command: taint
    kind: nodes
    name: "{{ item }}"
    taints:
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
    state: present
  loop: "{{ groups['master'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

# ============================================================================
# Storage Exclusions (Longhorn)
# ============================================================================

- name: Label low-memory node for Longhorn exclusion
  kubernetes.core.kubectl:
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    command: label
    kind: nodes
    name: "{{ item }}"
    labels:
      node.longhorn.io/create-default-disk: "false"
    state: present
  loop: "{{ groups['low_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

# ============================================================================
# Verification
# ============================================================================

- name: Get node labels and taints
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    kind: Node
  register: nodes_info
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Display node configuration
  ansible.builtin.debug:
    msg: |
      {% for node in nodes_info.resources %}
      NAME: {{ node.metadata.name }}
      LABELS: {{ node.metadata.labels }}
      TAINTS: {{ node.spec.taints | default([]) }}
      {% endfor %}
  run_once: true