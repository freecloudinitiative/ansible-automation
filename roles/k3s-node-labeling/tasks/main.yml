---
- name: Label high-memory nodes
  ansible.builtin.command: |
    kubectl label nodes {{ item }} node-tier=high-memory --overwrite
  loop: "{{ groups['high_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  changed_when: true

- name: Label mid-memory nodes
  ansible.builtin.command: |
    kubectl label nodes {{ item }} node-tier=mid-memory --overwrite
  loop: "{{ groups['mid_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  changed_when: true

- name: Label low-memory node
  ansible.builtin.command: |
    kubectl label nodes {{ item }} node-tier=low-memory --overwrite
  loop: "{{ groups['low_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  changed_when: true

- name: Taint low-memory node
  ansible.builtin.command: |
    kubectl taint nodes {{ item }} memory=limited:NoSchedule --overwrite
  loop: "{{ groups['low_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  changed_when: true

- name: Taint master node
  ansible.builtin.command: |
    kubectl taint nodes {{ item }} node-role.kubernetes.io/master=:NoSchedule --overwrite
  loop: "{{ groups['master'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  changed_when: true

- name: Label low-memory node for Longhorn exclusion
  ansible.builtin.command: |
    kubectl label nodes {{ item }} node.longhorn.io/create-default-disk=false --overwrite
  loop: "{{ groups['low_memory'] | default([]) }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  changed_when: true

- name: Get node labels and taints
  ansible.builtin.command: |
    kubectl get nodes -o custom-columns=NAME:.metadata.name,LABELS:.metadata.labels,TAINTS:.spec.taints
  register: nodes_info
  changed_when: false
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Display node configuration
  ansible.builtin.debug:
    msg: "{{ nodes_info.stdout }}"
  run_once: true
