---
- name: Check if K3S bootstrap token exists
  ansible.builtin.stat:
    path: /etc/k3s-bootstrap-token
  register: k3s_token_file

- name: Generate K3S bootstrap token
  ansible.builtin.set_fact:
    k3s_token: "{{ lookup('password', '/dev/null length=64 chars=hexdigits') }}"
  when: not k3s_token_file.stat.exists

- name: Write token to file
  ansible.builtin.copy:
    content: "{{ k3s_token }}"
    dest: /etc/k3s-bootstrap-token
    owner: root
    group: root
    mode: '0600'
  when: not k3s_token_file.stat.exists
  become: true
