---
# ============================================================================
# Check Existing Token
# ============================================================================

- name: Check if K3S bootstrap token exists
  ansible.builtin.stat:
    path: /etc/k3s-bootstrap-token
  register: k3s_token_file

# ============================================================================
# Generate and Save Token
# ============================================================================

- name: Generate and write K3S bootstrap token
  ansible.builtin.shell:
    cmd: "openssl rand -hex 32 > /etc/k3s-bootstrap-token && chmod 600 /etc/k3s-bootstrap-token"
    creates: /etc/k3s-bootstrap-token
  become: true