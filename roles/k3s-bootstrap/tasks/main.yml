---
# ============================================================================
# Check Existing Token
# ============================================================================

- name: Check if K3S bootstrap token exists
  ansible.builtin.stat:
    path: /etc/k3s-bootstrap-token
  register: k3s_token_file

# ============================================================================
# Generate Token
# ============================================================================

- name: Generate K3S bootstrap token
  ansible.builtin.command:
    argv:
      - openssl
      - rand
      - -hex
      - "32"
  register: k3s_token
  changed_when: true
  when: not k3s_token_file.stat.exists
  become: true

# ============================================================================
# Write Token
# ============================================================================

- name: Write bootstrap token
  ansible.builtin.copy:
    content: "{{ k3s_token.stdout }}"
    dest: /etc/k3s-bootstrap-token
    mode: "0600"
  when: not k3s_token_file.stat.exists
  become: true
