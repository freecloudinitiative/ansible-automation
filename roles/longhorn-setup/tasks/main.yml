---
# ============================================================================
# Longhorn Storage Installation
# ============================================================================

- name: Label nodes for Longhorn disk exclusion
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Node
      metadata:
        name: "{{ item }}"
        labels:
          node.longhorn.io/create-default-disk: "false"
  loop: "{{ longhorn_exclude_nodes | default([]) }}"
  when: longhorn_exclude_nodes is defined and longhorn_exclude_nodes | length > 0

- name: Add Longhorn Helm repository
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    state: present

- name: Create Longhorn namespace
  kubernetes.core.k8s:
    name: "{{ longhorn_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"

- name: Install Longhorn Helm chart
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    release_namespace: "{{ longhorn_namespace }}"
    values:
      defaultSettings:
        defaultReplicaCount: "{{ longhorn_replica_count }}"
        backupTarget: "{{ longhorn_backup_target | default('') }}"
        backupTargetCredentialSecret: "{{ longhorn_backup_secret | default('') }}"
      ingress:
        enabled: "{{ longhorn_ingress_enabled }}"
        ingressClassName: "{{ longhorn_ingress_class | default('') }}"
        host: "{{ longhorn_ingress_host | default('') }}"
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
    state: present
    wait: true
    wait_condition: "{{ longhorn_wait_condition }}"
    timeout: "{{ longhorn_timeout }}"
  register: longhorn_helm_install

- name: Verify Longhorn Manager deployment is ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: longhorn-manager
    namespace: "{{ longhorn_namespace }}"
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
  register: longhorn_manager
  until:
    - longhorn_manager.resources | length > 0
    - longhorn_manager.resources[0].status.readyReplicas | default(0) > 0
  retries: 30
  delay: 10

- name: Verify Longhorn UI is ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: longhorn-ui
    namespace: "{{ longhorn_namespace }}"
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
  register: longhorn_ui
  until:
    - longhorn_ui.resources | length > 0
    - longhorn_ui.resources[0].status.readyReplicas | default(0) > 0
  retries: 30
  delay: 10

- name: Get Longhorn frontend service
  kubernetes.core.k8s_info:
    kind: Service
    name: longhorn-frontend
    namespace: "{{ longhorn_namespace }}"
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    context: "{{ context | default(omit) }}"
  register: longhorn_service

- name: Display Longhorn installation info
  ansible.builtin.debug:
    msg: |
      Longhorn successfully installed in namespace: {{ longhorn_namespace }}
      Manager ready: {{ longhorn_manager.resources[0].status.readyReplicas | default(0) }}/{{ longhorn_manager.resources[0].spec.replicas }}
      UI ready: {{ longhorn_ui.resources[0].status.readyReplicas | default(0) }}/{{ longhorn_ui.resources[0].spec.replicas }}

      To access Longhorn UI:
      {% if longhorn_ingress_enabled %}
      - Via Ingress: https://{{ longhorn_ingress_host }}
      {% else %}
      - Via Port-Forward: kubectl port-forward -n {{ longhorn_namespace }} svc/longhorn-frontend 8081:80
      {% endif %}
