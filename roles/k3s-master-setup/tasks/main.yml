---
# ============================================================================
# Preparation
# ============================================================================

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  become: true
  register: k3s_script_download

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

# ============================================================================
# Installation
# ============================================================================

- name: Install k3s server with cluster-init
  ansible.builtin.command:
    argv:
      - /tmp/k3s-install.sh
      - server
      - --cluster-init
      - --token-file
      - /etc/k3s-bootstrap-token
      - --tls-san=master1.local
      - --node-name=master1
      - --etcd-snapshot-schedule-cron=0 */6 * * *
      - --etcd-snapshot-retention=10
      - --write-kubeconfig-mode=640
      - --kube-apiserver-arg=authorization-mode=Node,RBAC
  become: true
  when: not k3s_binary.stat.exists or k3s_script_download.changed
  register: k3s_install
  changed_when: "'k3s' in k3s_install.stdout"

# ============================================================================
# Verification
# ============================================================================

- name: Wait for k3s to be ready
  ansible.builtin.wait_for:
    port: 6443
    host: localhost
    delay: 5
    timeout: 60
  when: k3s_install.changed

- name: Verify k3s installation
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - --version
  register: k3s_version
  changed_when: false

- name: Display k3s version
  ansible.builtin.debug:
    msg: "K3s installed: {{ k3s_version.stdout }}"
