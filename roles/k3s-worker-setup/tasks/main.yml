# ============================================================================
# Preparation
# ============================================================================
- name: Get node hostname
  ansible.builtin.command:
    argv:
      - hostname
  register: node_hostname
  changed_when: false

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  become: true

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

# ============================================================================
# Installation
# ============================================================================
- name: Install k3s agent (worker)
  ansible.builtin.command:
    argv:
      - /tmp/k3s-install.sh
      - agent
      - --server
      - https://master1.local:6443
      - --token-file
      - /etc/rancher/node/password
      - --node-name
      - "{{ node_hostname.stdout }}"
  become: true
  when: not k3s_binary.stat.exists
  register: k3s_install
  changed_when: k3s_install.rc == 0 and not k3s_binary.stat.exists

# ============================================================================
# Verification
# ============================================================================
- name: Wait for k3s agent to be ready
  ansible.builtin.wait_for:
    port: 10250
    host: localhost
    delay: 5
    timeout: 60
  when: k3s_install.changed
  become: true

- name: Verify k3s agent installation
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - --version
  register: k3s_version
  changed_when: false
  when: k3s_install.changed

- name: Display k3s agent version
  ansible.builtin.debug:
    msg: "K3s agent installed: {{ k3s_version.stdout }}"
  when: k3s_install.changed

# ============================================================================
# Cleanup
# ============================================================================
- name: Check if password file exists
  ansible.builtin.stat:
    path: /etc/rancher/node/password
  register: password_file
  become: true

- name: Check if shred command is available
  ansible.builtin.command:
    cmd: "which shred"
  register: shred_available
  changed_when: false
  failed_when: false
  when: password_file.stat.exists and k3s_install.changed

- name: Securely remove password file (shred method)
  ansible.builtin.command:
    cmd: "shred -vfz -n 3 /etc/rancher/node/password"
  become: true
  changed_when: false
  when: password_file.stat.exists and k3s_install.changed and shred_available.rc == 0

- name: Securely remove password file (dd + rm fallback)
  ansible.builtin.shell: |
    dd if=/dev/zero of=/etc/rancher/node/password bs=4096 2>/dev/null || true
    rm -f /etc/rancher/node/password
  become: true
  changed_when: false
  when: password_file.stat.exists and k3s_install.changed and shred_available.rc != 0

- name: Verify password file is removed
  ansible.builtin.stat:
    path: /etc/rancher/node/password
  register: password_file_final
  become: true
  changed_when: false

- name: Assert password file cleanup
  ansible.builtin.assert:
    that:
      - not password_file_final.stat.exists
    fail_msg: "Password file cleanup failed!"
    success_msg: "Password file securely removed ✓"
